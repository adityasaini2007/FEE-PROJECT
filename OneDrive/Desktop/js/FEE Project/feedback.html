<!DOCTYPE html>
<html>
<head>
    <title>AgriHub - Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">AgriHub</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="policies.html">Policies</a></li>
            <li><a href="helpline.html">Helpline</a></li>
            <li><a href="planning.html">Planning</a></li>
            <li><a href="feedback.html">Feedback</a></li>
        </ul>
    </nav>
    <header style="background: linear-gradient(rgba(21, 128, 61, 0.8), rgba(22, 101, 52, 0.9)), url('https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&q=80&w=1920'); background-size: cover; background-position: center;">
        <h1>Your Feedback</h1>
        <p>Help us improve our services for the farming community.</p>
    </header>
    <main>
        <div class="card">
            <h2>Feedback</h2>
            <div id="step1">
                <p>1. How was your experience?</p>
                <button class="btn" onclick="nextStep('step2')">Good</button>
                <button class="btn" onclick="nextStep('step2')">Bad</button>
            </div>
            <div id="step2" style="display:none;">
                <p>2. Any suggestions?</p>
                <textarea style="width:100%; height:100px;"></textarea><br><br>
                <button class="btn" onclick="nextStep('success')">Submit</button>
            </div>
            <div id="success" style="display:none;">
                <p>✅ Thank you for your feedback!</p>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 AgriHub Project - Empowering Farmers</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
