<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Ledger - AgriConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar Container -->
    <nav class="navbar glass-effect">
        <div class="nav-brand">
            <span class="icon">🌱</span> <span>AgriConnect</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn">Dashboard</a>
            <a href="policies.html" class="nav-btn">Policies</a>
            <a href="helpline.html" class="nav-btn">Helplines</a>
            <a href="watering.html" class="nav-btn">Watering</a>
            <a href="diagnostic.html" class="nav-btn">Diagnostic</a>
            <a href="profit.html" class="nav-btn active">Profit Ledger</a>
            <a href="feedback.html" class="nav-btn">Feedback</a>
        </div>
        <button class="mobile-toggle">☰</button>
    </nav>

    <!-- Main Container -->
    <main class="container">
        <section id="profitPage" class="page-section fade-in">
            <div class="card glass-effect" style="text-align: center;">
                <div class="feature-icon-img emoji-icon">📈</div>
                <h2>Profit & Expense Calculator</h2>
                <form id="ledgerForm" class="grid-form mt-2" style="text-align: left;">
                    <div class="input-group">
                        <label>Seed Cost (₹)</label>
                        <input type="number" id="seedCost" required>
                    </div>
                    <div class="input-group">
                        <label>Fertilizer Cost (₹)</label>
                        <input type="number" id="fertCost" required>
                    </div>
                    <div class="input-group">
                        <label>Labor Cost (₹)</label>
                        <input type="number" id="laborCost" required>
                    </div>
                    <div class="input-group">
                        <label>Expected Revenue (₹)</label>
                        <input type="number" id="exRevenue" required>
                    </div>
                    <button type="submit" class="primary-btn full-width">Calculate</button>
                </form>

                <div id="calcResult" class="result-box mt-2 hidden">
                    <h3>Net Profit / Loss:</h3>
                    <div id="profitValue" class="massive-text">₹ 0</div>
                </div>
            </div>
        </section>
    </main>
    
    <!-- Onboarding placeholder -->
    <div id="onboardingModal" class="modal-overlay hidden">
        <div class="modal glass-effect">
            <h2>Please setup your profile on the Dashboard</h2>
            <a href="index.html" class="primary-btn mt-1">Go to Dashboard</a>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
