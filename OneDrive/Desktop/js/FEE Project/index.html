<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AgriConnect</title>
    <meta name="description" content="AgriConnect Dashboard – your personalised farming companion for soil insights, NPK trends, policies and more.">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar glass-effect">
        <div class="nav-brand">
            <span class="icon">🌱</span> <span>AgriConnect</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn active">Dashboard</a>
            <a href="policies.html" class="nav-btn">Policies</a>
            <a href="helpline.html" class="nav-btn">Helplines</a>
            <a href="watering.html" class="nav-btn">Watering</a>
            <a href="diagnostic.html" class="nav-btn">Diagnostic</a>
            <a href="profit.html" class="nav-btn">Profit Ledger</a>
            <a href="feedback.html" class="nav-btn">Feedback</a>
        </div>
        <div class="nav-right">
            <button id="logoutBtn" class="logout-btn hidden" title="Sign out">⎋ Sign out</button>
            <button class="mobile-toggle">☰</button>
        </div>
    </nav>

    <!-- ── Auth Modal (Login / Register) ── -->
    <div id="onboardingModal" class="modal-overlay hidden">
        <div class="modal auth-modal glass-effect">

            <!-- Logo mark -->
            <div class="auth-logo">🌱</div>
            <h2 class="auth-heading">AgriConnect</h2>
            <p class="auth-sub">Your smart farming companion</p>

            <!-- Tab switcher -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin"  onclick="switchAuthTab('login')">Sign In</button>
                <button class="auth-tab"        id="tabReg"    onclick="switchAuthTab('register')">Register</button>
            </div>

            <!-- ── LOGIN FORM ── -->
            <div id="loginForm" class="auth-form">
                <div class="auth-input-group">
                    <span class="auth-input-icon">👤</span>
                    <input type="text" id="loginName" placeholder="Your name" autocomplete="username">
                </div>
                <div class="auth-input-group">
                    <span class="auth-input-icon">🔒</span>
                    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
                </div>
                <p class="auth-error hidden" id="loginError">Incorrect name or password.</p>
                <button id="loginBtn" class="primary-btn full-width auth-btn">Sign In</button>
            </div>

            <!-- ── REGISTER FORM ── -->
            <div id="registerForm" class="auth-form hidden">
                <div class="auth-input-group">
                    <span class="auth-input-icon">👤</span>
                    <input type="text" id="regName" placeholder="Your name" autocomplete="username">
                </div>
                <div class="auth-input-group">
                    <span class="auth-input-icon">🌍</span>
                    <select id="regSoil">
                        <option value="" disabled selected>Select Soil Type</option>
                        <option value="Alluvial">Alluvial</option>
                        <option value="Black">Black</option>
                        <option value="Red">Red</option>
                        <option value="Laterite">Laterite</option>
                        <option value="Arid">Arid</option>
                    </select>
                </div>
                <div class="auth-input-group">
                    <span class="auth-input-icon">🔒</span>
                    <input type="password" id="regPass" placeholder="Create a password" autocomplete="new-password">
                </div>
                <div class="auth-input-group">
                    <span class="auth-input-icon">✅</span>
                    <input type="password" id="regPassConfirm" placeholder="Confirm password" autocomplete="new-password">
                </div>
                <p class="auth-error hidden" id="regError">Passwords do not match.</p>
                <button id="registerBtn" class="primary-btn full-width auth-btn">Create Account</button>
            </div>

        </div>
    </div>

    <!-- Main Container -->
    <main class="container">
        <section id="dashboardPage" class="page-section fade-in">
            <img src="hero-bg.png" alt="Agriculture Dashboard Hero" class="hero-img">
            <header class="section-header">
                <h2>Welcome, <span id="displayFarmerName" class="highlight-text">Farmer</span>!</h2>
                <p>Your Soil Type: <strong id="displaySoilType" class="highlight-text">Unknown</strong></p>
                <div class="crop-suggestions">
                    <h4>Recommended Crops for your soil:</h4>
                    <div id="cropTags" class="tag-container"></div>
                </div>
            </header>

            <div class="card glass-effect chart-card">
                <div class="chart-header">
                    <h3>Soil NPK Trends <span class="chart-soil-label" id="chartSoilLabel"></span></h3>
                    <select id="chartSoilFilter" class="chart-soil-select">
                        <option value="" disabled selected>Change Soil View</option>
                        <option value="Alluvial">Alluvial</option>
                        <option value="Black">Black</option>
                        <option value="Red">Red</option>
                        <option value="Laterite">Laterite</option>
                        <option value="Arid">Arid</option>
                    </select>
                </div>
                <div class="chart-container">
                    <canvas id="npkChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast hidden"></div>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
